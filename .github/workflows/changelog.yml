name: Génération du changelog

# Régénère CHANGELOG.md à chaque publication d'un tag de version (v1.0.0, v1.2.3…)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet requis pour git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer le changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/generate_changelog.py "$VERSION"

      - name: Commiter le changelog mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(changelog): génération automatique pour ${{ github.ref_name }}"
          git push origin main
